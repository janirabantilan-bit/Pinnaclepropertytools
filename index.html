<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austin Zillow Link Parser</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #006aff; margin-top: 0; }
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #006aff; }
        button { padding: 12px 20px; background-color: #006aff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0055cc; }
        .loading { display: none; text-align: center; font-style: italic; color: #666; margin: 20px 0; }
        .error { display: none; color: #d93838; background: #fdf2f2; padding: 12px; border-radius: 6px; margin-bottom: 20px; text-align: center; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        .results-table th, .results-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .results-table th { background-color: #f8f9fa; font-weight: 600; width: 40%; }
        a { color: #006aff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Austin Zillow Link Parser</h2>
    
    <div class="search-box">
        <input type="text" id="urlInput" placeholder="Paste a Zillow property URL here...">
        <button onclick="parseZillowUrl()">Extract Details</button>
    </div>

    <div id="loadingStatus" class="loading">Connecting to data node and parsing page... (~10-20 seconds)</div>
    <div id="errorStatus" class="error"></div>

    <table id="resultsTable" class="results-table">
        <tr><th>Type:</th><td id="resType">N/A</td></tr>
        <tr><th>Neighborhood Name:</th><td id="resNeighborhood">N/A</td></tr>
        <tr><th>Beds/Baths:</th><td id="resBedsBaths">N/A</td></tr>
        <tr><th>Stories:</th><td id="resStories">N/A</td></tr>
        <tr><th>Square Ft:</th><td id="resSqFt">N/A</td></tr>
        <tr><th>Lot size:</th><td id="resLot">N/A</td></tr>
        <tr><th>Year Built:</th><td id="resYear">N/A</td></tr>
        <tr><th>HOA:</th><td id="resHoa">N/A</td></tr>
        <tr><th>Zestimate:</th><td id="resZestimate">N/A</td></tr>
        <tr><th>Zillow Link:</th><td><a id="resLink" href="#" target="_blank">Open Zillow Page</a></td></tr>
        <tr><th>Region in Austin:</th><td id="resRegion">N/A</td></tr>
    </table>
</div>

<script>
    const austinRegions = {
        "78701": "Downtown", "78702": "East Austin", "78703": "Central / West Austin", "78704": "South Austin",
        "78705": "Central / UT Campus", "78722": "East Austin / French Place", "78735": "Southwest Austin", 
        "78741": "Southeast Austin", "78746": "Westlake / West Austin", "78751": "North Central / Hyde Park", 
        "78759": "North Austin", "78745": "South Austin"
    };

    function extractZip(text) {
        if (!text) return null;
        const match = text.match(/\b\d{5}\b/);
        return match ? match[0] : null;
    }

    async function parseZillowUrl() {
        const targetUrl = document.getElementById('urlInput').value.trim();
        const loader = document.getElementById('loadingStatus');
        const errorDiv = document.getElementById('errorStatus');
        const table = document.getElementById('resultsTable');

        if (!targetUrl || !targetUrl.includes('zillow.com')) {
            alert("Please paste a valid Zillow URL link!");
            return;
        }

        loader.style.display = 'block';
        errorDiv.style.display = 'none';
        table.style.display = 'none';

        // PASTE YOUR ACTUAL APIFY TOKEN STRING BETWEEN THE QUOTES
        const APIFY_TOKEN = "PASTE_YOUR_APIFY_TOKEN_HERE"; 

        try {
            // Using the precise URL Scraper Engine you found in your screenshot!
            const response = await fetch(`https://api.apify.com/v2/acts/zillowscraper~zillow-property-list/run-sync-get-dataset-items?token=${APIFY_TOKEN}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "urls": [targetUrl]
                })
            });

            if (!response.ok) throw new Error("API token invalid or account out of compute space.");

            const data = await response.json();
            
            if (!data || data.length === 0) {
                throw new Error("Could not parse data from this link. Make sure it points to a property details page.");
            }

            const property = data[0];

            // Render output fields from the webpage extraction structure
            document.getElementById('resType').innerText = property.homeType || property.propertyType || "Residential";
            document.getElementById('resNeighborhood').innerText = property.neighborhood || "Austin Area";
            document.getElementById('resBedsBaths').innerText = `${property.bedrooms || property.beds || '0'} Beds / ${property.bathrooms || property.baths || '0'} Baths`;
            document.getElementById('resStories').innerText = property.stories || "N/A";
            
            const size = property.livingArea || property.sqft || property.squareFootage;
            document.getElementById('resSqFt').innerText = size ? `${size.toLocaleString()} sq ft` : "N/A";
            document.getElementById('resLot').innerText = property.lotSize || "N/A";
            document.getElementById('resYear').innerText = property.yearBuilt || "N/A";
            document.getElementById('resHoa').innerText = property.hoa ? `$${property.hoa}/mo` : "$0 / None";
            
            const zst = property.zestimate || property.price;
            document.getElementById('resZestimate').innerText = zst ? `$${zst.toLocaleString()}` : "N/A";
            document.getElementById('resLink').href = targetUrl;

            // Grab the zip code out of the full address string or page payload to calculate the region
            const fullAddress = property.address || property.streetAddress || targetUrl;
            const zip = extractZip(fullAddress);
            document.getElementById('resRegion').innerText = austinRegions[zip] || "Greater Austin Area";

            loader.style.display = 'none';
            table.style.display = 'table';

        } catch (err) {
            loader.style.display = 'none';
            errorDiv.innerText = err.message;
            errorDiv.style.display = 'block';
        }
    }
</script>
</body>
</html>
